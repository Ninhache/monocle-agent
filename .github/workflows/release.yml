name: Release

# Cut a tag + GitHub release automatically whenever the crate version on `main`
# changes. `main` is protected, so this only fires on reviewed merges — that is
# the whole point of protecting the branch.

on:
  push:
    branches: [main]
    paths:
      - Cargo.toml

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  tag:
    name: tag-and-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read crate version
        id: version
        run: |
          version="$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Crate version: $version"

      - name: Check whether the tag already exists
        id: exists
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.version }} already exists — nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag and release
        if: steps.exists.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.version.outputs.version }}"
          git tag "$tag"
          git push origin "$tag"
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes

      - name: Install native-tls build deps
        if: steps.exists.outputs.exists == 'false'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        if: steps.exists.outputs.exists == 'false'

      - name: Publish to crates.io
        if: steps.exists.outputs.exists == 'false'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Tolerant: if the token isn't configured yet, skip publish but keep the
          # tag + GitHub release. Add the CARGO_REGISTRY_TOKEN secret to enable it.
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN not set — skipping crates.io publish."
            exit 0
          fi
          cargo publish
